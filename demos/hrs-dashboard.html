<html lang="ko">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>

        body { font-family: 'Malgun Gothic', -apple-system, sans-serif; }

        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.12); }
        .customer-card { transition: all 0.15s ease; cursor: pointer; border-left: 4px solid transparent; }
        .customer-card:hover { background: #f8fafc; }
        .customer-card.active { background: #eff6ff; border-left-color: #3b82f6; }
        .corp-btn { transition: all 0.15s ease; }
        .corp-btn.active { font-weight: 600; box-shadow: 0 0 0 2px currentColor; }
        .month-tab { transition: all 0.15s ease; }
        .month-tab.active { background: #3b82f6; color: white; }
        #map { z-index: 1; }
        .detail-table th { position: sticky; top: 0; background: #f8fafc; }
        .flow-line { stroke-dasharray: 12, 8; animation: flowAnim 1.2s linear infinite; }
        @keyframes flowAnim { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
        .custom-marker-bg { background: transparent !important; border: none !important; }
        .station-pill { background: rgba(255,255,255,0.92); backdrop-filter: blur(4px); padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.12); border: 1px solid rgba(0,0,0,0.06); white-space: nowrap; }

</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Navigation -->
<nav class="bg-gray-900 text-white">
    <div class="max-w-screen-2xl mx-auto px-3 lg:px-6 flex items-center h-9 text-xs lg:text-sm gap-4">

    </div>
</nav>

<!-- Header -->
<header class="bg-white shadow-sm border-b border-gray-200">

        <div class="flex items-center gap-2 min-w-0">

        <div class="flex gap-1 overflow-x-auto" id="monthTabs"></div>
    </div>
</header>

<!-- Summary Cards -->
<section class="max-w-screen-2xl mx-auto px-3 lg:px-6 py-3">
    <div class="grid grid-cols-3 lg:grid-cols-5 gap-2 lg:gap-3" id="summaryCards"></div>
</section>

<!-- Main Area: Customer Panel + Map -->
<section class="max-w-screen-2xl mx-auto px-3 lg:px-6 pb-3">
    <div class="flex flex-col lg:flex-row gap-3">
        <!-- Left Panel -->
        <div class="w-full lg:w-[30%] bg-white rounded-lg shadow-sm border border-gray-200 flex flex-col" style="max-height: 600px;">
            <!-- Left Panel Tabs -->
            <div class="flex border-b border-gray-200" id="leftTabs">
                <button class="flex-1 py-2 text-sm font-semibold text-blue-600 border-b-2 border-blue-600" data-tab="customer">거래처</button>
                <button class="flex-1 py-2 text-sm font-medium text-gray-400 hover:text-gray-600" data-tab="station">충전소</button>
            </div>
            <!-- Corp Filters -->
            <div class="p-3 border-b border-gray-100 flex gap-1.5 flex-wrap" id="corpFilters"></div>
            <!-- Customer List -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-2" id="customerList"></div>
        </div>
        <!-- Map -->
        <div class="w-full lg:w-[70%] relative">
            <div id="map" class="rounded-lg shadow-sm border border-gray-200" style="height: 550px;"></div>
            <div class="absolute top-3 right-3 z-[1000] flex gap-1.5">
                <button id="resetSelection" class="bg-white px-3 py-1.5 rounded-lg shadow-md text-sm font-medium text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors hidden">
                    선택 초기화
                </button>
                <button id="toggleAllLines" class="bg-white px-3 py-1.5 rounded-lg shadow-md text-sm font-medium text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors">
                전체 네트워크 보기
            </button>
            </div>
        </div>
    </div>
</section>

<!-- Detail Panel (shown on customer click) -->
<section class="max-w-screen-2xl mx-auto px-3 lg:px-6 pb-4" id="detailSection" style="display:none;">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
        <h3 class="text-base font-bold text-gray-800 mb-3" id="detailTitle"></h3>
        <div class="flex flex-col lg:flex-row gap-4 items-start">
            <div class="flex-1 lg:w-3/5 overflow-x-auto">
                <table class="w-full text-sm detail-table">
                    <thead>
                        <tr class="text-left text-gray-500 border-b border-gray-200">
                            <th class="py-2 px-2">충전소</th>
                            <th class="py-2 px-2 text-right">충전량(kg)</th>
                            <th class="py-2 px-2 text-right">횟수</th>
                            <th class="py-2 px-2 text-right">금액<span class="text-[9px] text-gray-400 block">VAT포함</span></th>
                            <th class="py-2 px-2 text-right">비율</th>
                        </tr>
                    </thead>
                    <tbody id="detailTableBody"></tbody>
                </table>
            </div>
            <div class="w-full lg:w-2/5 flex-shrink-0">
                <h4 class="text-xs font-bold text-gray-500 uppercase mb-2">충전소별 거래처 비중</h4>
                <div style="height: 320px">
                    <canvas id="detailPieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->

// ===== NORMALIZATION =====
function normalizeCustomerName(name) {
    if (name === '삼성디지털시티(수원)') return '삼성전자(수원)';
    if (name === '평택 미군스쿨') return '평택미군스쿨';
    if (name.startsWith('경복초등학교(') && name.endsWith(')')) return '경복초등학교';
    return name;
}

// Merge 경복초 sub-entries and normalize names in detail data
let _cachedDetailMonth = null, _cachedDetailData = null;
function getNormalizedDetail(month) {
    if (_cachedDetailMonth === month && _cachedDetailData) return _cachedDetailData;
    const raw = CUSTOMER_STATION_DETAIL[month];
    if (!raw) return {};
    const result = {};
    for (const [cust, stations] of Object.entries(raw)) {
        if (cust === '거래처') continue;
        const norm = normalizeCustomerName(cust);
        if (!result[norm]) result[norm] = {};
        for (const [stn, data] of Object.entries(stations)) {
            if (!result[norm][stn]) result[norm][stn] = { kg: 0, count: 0, amount: 0 };
            result[norm][stn].kg += data.kg;
            result[norm][stn].count += data.count;
            result[norm][stn].amount += data.amount;
        }
    }
    _cachedDetailMonth = month;
    _cachedDetailData = result;
    return result;
}

function renderSummaryCards(md, prevMd) {
    const detail = getNormalizedDetail(currentMonth);
    // Use summary.vehicle_count (actual charging vehicles from Excel)
    const vehicleCount = md.summary.vehicle_count;
    // Compute total amount from detail
    let totalAmount = 0;
    for (const stations of Object.values(detail)) {
        for (const d of Object.values(stations)) totalAmount += d.amount;
    }
    const stationCount = md.charging_stations.length;

    // Previous month values
    let prevVehicles = 0, prevKg = 0, prevAmount = 0, prevCustomers = 0, prevStations = 0;
    if (prevMd) {
        prevVehicles = prevMd.summary.vehicle_count;
        prevKg = prevMd.summary.total_kg;
        const prevDetail = getNormalizedDetail(MONTHS[MONTHS.indexOf(currentMonth) - 1]);
        for (const stations of Object.values(prevDetail)) {
            for (const d of Object.values(stations)) prevAmount += d.amount;
        }
        prevCustomers = prevMd.summary.customer_count;
        prevStations = prevMd.charging_stations.length;
    }

    const cards = [
        { label: '수소버스', value: vehicleCount, unit: '대', prev: prevVehicles, icon: '&#128652;', gradient: 'from-blue-500 to-blue-600' },
        { label: '총 충전량', value: md.summary.total_kg, unit: 'kg', prev: prevKg, icon: '&#9981;', gradient: 'from-emerald-500 to-emerald-600', fmt: 'kg' },
        { label: '총 충전금액', value: totalAmount, unit: '원', prev: prevAmount, icon: '&#128176;', gradient: 'from-purple-500 to-purple-600', fmt: 'won' },
        { label: '거래처', value: md.summary.customer_count, unit: '개', prev: prevCustomers, icon: '&#127970;', gradient: 'from-orange-500 to-orange-600' },
        { label: '이용 충전소', value: stationCount, unit: '개소', prev: prevStations, icon: '&#9981;', gradient: 'from-cyan-500 to-cyan-600' }
    ];

    document.getElementById('summaryCards').innerHTML = cards.map(c => {
        let display, change = '';
        if (c.fmt === 'won') {
            display = (c.value / 100000000).toFixed(1) + '억';
        } else if (c.fmt === 'kg') {
            display = Math.round(c.value).toLocaleString('ko-KR');
        } else {
            display = c.value.toLocaleString('ko-KR');
        }
        if (c.prev) {
            const diff = c.value - c.prev;
            const sign = diff >= 0 ? '+' : '';
            const arrow = diff >= 0 ? '&#9650;' : '&#9660;';
            const bg = diff >= 0 ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.2)';
            let diffText;
            if (c.fmt === 'won') {
                diffText = `${sign}${(diff / 100000000).toFixed(1)}억`;
            } else if (c.fmt === 'kg') {
                diffText = `${sign}${Math.round(diff).toLocaleString('ko-KR')}`;
            } else {
                diffText = `${sign}${diff}`;
            }
            change = `<span class="inline-flex items-center gap-0.5 text-xs font-semibold text-white px-1.5 py-0.5 rounded-full" style="background:${bg}">${arrow} ${diffText}</span>`;
        }
        return `<div class="stat-card bg-gradient-to-br ${c.gradient} text-white rounded-xl p-3 lg:p-4 shadow-sm">
            <div class="text-xs lg:text-sm opacity-80 mb-1">${c.icon} ${c.label}</div>
            <div class="text-lg lg:text-2xl font-bold">${display}<span class="text-xs lg:text-sm font-normal opacity-80 ml-1">${c.unit}</span></div>
            <div class="mt-1 min-h-[20px]">${change}</div>
        </div>`;
    }).join('');
}

// ===== CUSTOMER LIST =====
function getCustomersForMonth(month) {
    const detail = getNormalizedDetail(month);
    const vbc = MONTHLY_DATA[month].vehicles_by_customer;
    const normVehicles = {};
    for (const [c, v] of Object.entries(vbc)) {
        const n = normalizeCustomerName(c);
        normVehicles[n] = Math.max(normVehicles[n] || 0, v);
    }
    const customers = [];
    for (const [name, stations] of Object.entries(detail)) {
        let totalKg = 0, totalCount = 0, totalAmount = 0;
        for (const d of Object.values(stations)) { totalKg += d.kg; totalCount += d.count; totalAmount += d.amount; }
        const company = CUSTOMER_COMPANY[name] || '온버스';
        customers.push({
            name, company,
            vehicles: normVehicles[name] || 0,
            totalKg, totalCount, totalAmount,
            stationCount: Object.keys(stations).length
        });
    }
    customers.sort((a, b) => b.totalKg - a.totalKg);
    return customers;
}

function renderCustomerList() {
    const customers = getCustomersForMonth(currentMonth);
    const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);
    const container = document.getElementById('customerList');

    // Selection clear button
    const clearBtn = selectedCustomers.size > 0
        ? `<div class="flex items-center justify-between px-2 py-1.5 mb-1 bg-blue-50 rounded-lg">
            <span class="text-xs font-medium text-blue-700">${selectedCustomers.size}개 거래처 선택</span>
            <button id="clearSelection" class="text-xs text-blue-500 hover:text-blue-700 font-medium">초기화</button>
        </div>` : '';

    container.innerHTML = clearBtn + filtered.map(c => {
        const color = CORP_COLORS[c.company] || '#6B7280';
        const isActive = selectedCustomers.has(c.name);
        return `<div class="customer-card rounded-lg p-2.5 mb-1.5 ${isActive ? 'active' : ''}" data-customer="${c.name}" style="${isActive ? `border-left-color:${color};background:#f0f9ff` : ''}">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="w-3.5 h-3.5 rounded flex-shrink-0 border-2 flex items-center justify-center text-[9px]" style="border-color:${color};${isActive ? `background:${color};color:white` : ''}">${isActive ? '✓' : ''}</span>
                    <span class="text-sm font-semibold text-gray-800 truncate">${c.name}</span>
                </div>
                <span class="text-xs text-gray-400 flex-shrink-0">${c.vehicles}대</span>
            </div>
            <div class="flex items-center gap-3 mt-1.5 ml-5 text-xs text-gray-500">
                <span class="font-medium text-gray-700">${Math.round(c.totalKg).toLocaleString('ko-KR')} kg</span>
                <span>${c.stationCount}개소</span>
                <span>${c.totalCount}회</span>
            </div>
        </div>`;
    }).join('');

    // Clear selection button
    const clearEl = document.getElementById('clearSelection');
    if (clearEl) {
        clearEl.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedCustomers.clear();
            document.getElementById('detailSection').style.display = 'none';
            renderCustomerList();
            updateMap();
        });
    }

    // Toggle selection on click
    container.querySelectorAll('.customer-card').forEach(el => {
        el.addEventListener('click', () => {
            if (selectedStations.size > 0) {
                selectedStations.clear();
            }
            const name = el.dataset.customer;
            if (selectedCustomers.has(name)) {
                selectedCustomers.delete(name);
            } else {
                selectedCustomers.add(name);
            }
            renderCustomerList();
            drawSpokesMulti();
            if (selectedCustomers.size > 0) showCustomerDetail();
            else document.getElementById('detailSection').style.display = 'none';
            updateResetButton();
        });
    });
}

// ===== MAP =====
function initMap() {
    const isMobile = L.Browser.mobile;
    map = L.map('map', { zoomControl: true, dragging: !isMobile, tap: !isMobile }).setView([37.35, 127.0], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 18
    }).addTo(map);

    document.getElementById('toggleAllLines').addEventListener('click', () => {
        showAllLines = !showAllLines;
        const btn = document.getElementById('toggleAllLines');
        btn.classList.toggle('bg-blue-50', showAllLines);
        btn.classList.toggle('text-blue-600', showAllLines);
        btn.classList.toggle('border-blue-300', showAllLines);
        updateMap();
    });

    document.getElementById('resetSelection').addEventListener('click', () => {
        selectedCustomers.clear();
        selectedStations.clear();
        document.getElementById('detailSection').style.display = 'none';
        renderLeftPanel();
        updateMap();
        updateResetButton();
    });
}

function updateResetButton() {
    const btn = document.getElementById('resetSelection');
    if (selectedCustomers.size > 0 || selectedStations.size > 0) {
        btn.classList.remove('hidden');
    } else {
        btn.classList.add('hidden');
    }
}

function updateMap() {
    // Clear old
    spokeLines.forEach(l => map.removeLayer(l));
    spokeLines = [];
    stationLabels.forEach(l => map.removeLayer(l));
    stationLabels = [];
    Object.values(customerMarkers).forEach(m => map.removeLayer(m));
    customerMarkers = {};
    Object.values(stationMarkers).forEach(m => map.removeLayer(m));
    stationMarkers = {};

    const md = MONTHLY_DATA[currentMonth];
    const detail = getNormalizedDetail(currentMonth);
    const customers = getCustomersForMonth(currentMonth);
    const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);
    const filteredNames = new Set(filtered.map(c => c.name));

    // Station lat/lng lookup
    const stationCoords = {};
    md.charging_stations.forEach(s => { stationCoords[s.name] = { lat: s.lat, lng: s.lng }; });

    // Draw station markers (only stations used by filtered customers)
    const usedStations = new Set();
    filtered.forEach(c => {
        const stations = detail[c.name];
        if (stations) Object.keys(stations).forEach(s => usedStations.add(s));
    });
    md.charging_stations.forEach(s => {
        if (!usedStations.has(s.name)) return;
        const sIcon = L.divIcon({
            html: `<div style="display:flex;flex-direction:column;align-items:center">
                <div style="width:28px;height:28px;background:#059669;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
            </div>`,
            className: 'custom-marker-bg',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });
        const marker = L.marker([s.lat, s.lng], { icon: sIcon }).addTo(map);
        marker.bindTooltip(s.name.replace(' 수소충전소', ''), { direction: 'top', offset: [0, -8] });
        marker.on('click', () => {
            if (showAllLines) {
                showAllLines = false;
                const btn = document.getElementById('toggleAllLines');
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-300');
            }
            // Clear customer selection when switching to station mode
            if (selectedCustomers.size > 0) {
                selectedCustomers.clear();
                renderCustomerList();
            }
            if (selectedStations.has(s.name)) {
                selectedStations.delete(s.name);
            } else {
                selectedStations.add(s.name);
            }
            if (leftTab !== 'station') {
                leftTab = 'station';
                document.querySelectorAll('#leftTabs button').forEach(b => {
                    b.classList.toggle('text-blue-600', b.dataset.tab === 'station');
                    b.classList.toggle('border-b-2', b.dataset.tab === 'station');
                    b.classList.toggle('border-blue-600', b.dataset.tab === 'station');
                    b.classList.toggle('font-semibold', b.dataset.tab === 'station');
                    b.classList.toggle('text-gray-400', b.dataset.tab !== 'station');
                    b.classList.toggle('font-medium', b.dataset.tab !== 'station');
                });
                document.getElementById('corpFilters').style.display = 'none';
            }
            renderStationList();
            drawStationSpokes();
            if (selectedStations.size > 0) showMultiStationDetail();
            else document.getElementById('detailSection').style.display = 'none';
            updateResetButton();
        });
        stationMarkers[s.name] = marker;
    });

    // Draw customer markers
    filtered.forEach(c => {
        const info = CUSTOMER_INFO[c.name];
        if (!info) return;
        const color = CORP_COLORS[c.company] || '#3B82F6';
        const size = Math.max(24, Math.min(36, 24 + Math.log(c.totalKg / 100) * 3));
        const cIcon = L.divIcon({
            html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:2.5px solid white;box-shadow:0 2px 8px ${color}44;display:flex;align-items:center;justify-content:center;transition:transform 0.2s">
                <svg width="${size*0.45}" height="${size*0.45}" viewBox="0 0 24 24" fill="white"><path d="M17 20H7V8l5-6 5 6v12zM9 18h6V9.2l-3-3.6L9 9.2V18z"/></svg>
            </div>`,
            className: 'custom-marker-bg',
            iconSize: [size, size],
            iconAnchor: [size/2, size/2]
        });
        const marker = L.marker([info.lat, info.lng], { icon: cIcon }).addTo(map);
        marker.bindTooltip(c.name, { direction: 'top', offset: [0, -8] });
        marker.on('click', () => {
            // 전체 보기 해제
            if (showAllLines) {
                showAllLines = false;
                const btn = document.getElementById('toggleAllLines');
                btn.classList.remove('bg-blue-50', 'text-blue-600', 'border-blue-300');
            }
            if (selectedStations.size > 0) {
                selectedStations.clear();
            }
            if (selectedCustomers.has(c.name)) {
                selectedCustomers.delete(c.name);
            } else {
                selectedCustomers.add(c.name);
            }
            if (leftTab !== 'customer') {
                leftTab = 'customer';
                document.querySelectorAll('#leftTabs button').forEach(b => {
                    b.classList.toggle('text-blue-600', b.dataset.tab === 'customer');
                    b.classList.toggle('border-b-2', b.dataset.tab === 'customer');
                    b.classList.toggle('border-blue-600', b.dataset.tab === 'customer');
                    b.classList.toggle('font-semibold', b.dataset.tab === 'customer');
                    b.classList.toggle('text-gray-400', b.dataset.tab !== 'customer');
                    b.classList.toggle('font-medium', b.dataset.tab !== 'customer');
                });
                document.getElementById('corpFilters').style.display = '';
            }
            renderCustomerList();
            drawSpokesMulti();
            if (selectedCustomers.size > 0) showCustomerDetail();
            else { document.getElementById('detailSection').style.display = 'none'; updateMap(); }
            updateResetButton();
        });
        customerMarkers[c.name] = marker;
    });

    // Draw spokes for selected customers
    if (showAllLines) {
        drawAllSpokes(filtered, detail, stationCoords);
    }
    if (selectedCustomers.size > 0) {
        drawSpokesMulti();
    }
}

function drawAllSpokes(customers, detail, stationCoords) {
    spokeLines.forEach(l => map.removeLayer(l));
    spokeLines = [];
    stationLabels.forEach(l => map.removeLayer(l));
    stationLabels = [];

    // Global max kg for proportional line width
    let globalMaxKg = 0;
    customers.forEach(c => {
        const stations = detail[c.name];
        if (!stations) return;
        for (const sData of Object.values(stations)) {
            if (sData.kg > globalMaxKg) globalMaxKg = sData.kg;
        }
    });
    if (globalMaxKg === 0) globalMaxKg = 1;

    customers.forEach(c => {
        const info = CUSTOMER_INFO[c.name];
        if (!info) return;
        const stations = detail[c.name];
        if (!stations) return;
        const color = CORP_COLORS[c.company] || '#3B82F6';

        for (const [sName, sData] of Object.entries(stations)) {
            const sc = stationCoords[sName];
            if (!sc) continue;
            const w = Math.max(2, 1.5 + (sData.kg / globalMaxKg) * 6);
            const line = L.polyline([[info.lat, info.lng], [sc.lat, sc.lng]], {
                color, weight: w, opacity: 0.7, className: 'flow-line'
            }).addTo(map);
            line.on('mouseover', () => { line.setStyle({ opacity: 1, weight: w + 1 }); });
            line.on('mouseout', () => { line.setStyle({ opacity: 0.7, weight: w }); });
            spokeLines.push(line);
        }
    });
}

function drawSpokesMulti() {
    const md = MONTHLY_DATA[currentMonth];
    const detail = getNormalizedDetail(currentMonth);

    spokeLines.forEach(l => map.removeLayer(l));
    spokeLines = [];
    stationLabels.forEach(l => map.removeLayer(l));
    stationLabels = [];

    if (selectedCustomers.size === 0) return;

    const stationCoords = {};
    md.charging_stations.forEach(s => { stationCoords[s.name] = { lat: s.lat, lng: s.lng }; });

    if (showAllLines) {
        const customers = getCustomersForMonth(currentMonth);
        const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);
        drawAllSpokes(filtered, detail, stationCoords);
    }

    // Aggregate station kg across all selected for labels
    const stationAgg = {};
    const bounds = [];

    for (const customerName of selectedCustomers) {
        const stations = detail[customerName];
        const info = CUSTOMER_INFO[customerName];
        if (!stations || !info) continue;

        const company = CUSTOMER_COMPANY[customerName] || '온버스';
        const color = CORP_COLORS[company];
        bounds.push([info.lat, info.lng]);

        // Find max kg among all selected for proportional width
        let allKgs = [];
        for (const cName of selectedCustomers) {
            const s = detail[cName];
            if (s) allKgs.push(...Object.values(s).map(d => d.kg));
        }
        const maxKg = Math.max(...allKgs) || 1;

        for (const [sName, sData] of Object.entries(stations)) {
            const sc = stationCoords[sName];
            if (!sc) continue;
            const w = Math.max(1.5, 1 + (sData.kg / maxKg) * 7);
            const opacity = showAllLines ? 0.8 : 0.7;
            const line = L.polyline([[info.lat, info.lng], [sc.lat, sc.lng]], {
                color, weight: w, opacity, className: 'flow-line'
            }).addTo(map);
            spokeLines.push(line);
            bounds.push([sc.lat, sc.lng]);

            // Aggregate for labels
            if (!stationAgg[sName]) stationAgg[sName] = { kg: 0, lat: sc.lat, lng: sc.lng };
            stationAgg[sName].kg += sData.kg;
        }
    }

    // Show aggregated station labels
    for (const [sName, agg] of Object.entries(stationAgg)) {
        const label = L.marker([agg.lat, agg.lng], {
            icon: L.divIcon({
                html: `<div class="station-pill" style="color:#1e40af">${Math.round(agg.kg).toLocaleString('ko-KR')}kg</div>`,
                className: 'custom-marker-bg',
                iconSize: [80, 24],
                iconAnchor: [40, -16]
            }),
            interactive: false
        });
        map.addLayer(label);
        stationLabels.push(label);
    }

    if (bounds.length > 1) {
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
    }
}

// ===== DETAIL PANEL =====
function showCustomerDetail() {
    const detail = getNormalizedDetail(currentMonth);
    if (selectedCustomers.size === 0) return;

    const vbc = MONTHLY_DATA[currentMonth].vehicles_by_customer;
    const normVehicles = {};
    for (const [c, v] of Object.entries(vbc)) {
        const n = normalizeCustomerName(c);
        normVehicles[n] = Math.max(normVehicles[n] || 0, v);
    }

    // Build per-customer per-station data
    const customerNames = [...selectedCustomers];
    const stationMap = {}; // stationName -> { customers: {name: kg}, total: {kg, count, amount} }

    let totalVehicles = 0;
    for (const cName of customerNames) {
        totalVehicles += (normVehicles[cName] || 0);
        const stations = detail[cName];
        if (!stations) continue;
        for (const [sName, d] of Object.entries(stations)) {
            if (!stationMap[sName]) stationMap[sName] = { customers: {}, total: { kg: 0, count: 0, amount: 0 } };
            stationMap[sName].customers[cName] = d.kg;
            stationMap[sName].total.kg += d.kg;
            stationMap[sName].total.count += d.count;
            stationMap[sName].total.amount += d.amount;
        }
    }

    // Sort stations by total kg desc
    const stationEntries = Object.entries(stationMap).sort((a, b) => b[1].total.kg - a[1].total.kg);

    // Title
    document.getElementById('detailSection').style.display = '';
    document.getElementById('detailSection').style.display = '';
    const detailTitleEl = document.getElementById('detailTitle');
    if (customerNames.length === 1) {
        const cn = customerNames[0];
        const corp = CUSTOMER_COMPANY[cn] || '온버스';
        const team = CUSTOMER_TEAM[cn] || '-';
        const corpColor = CORP_COLORS[corp];
        const teamColor = TEAM_COLORS[team] || '#6B7280';
        detailTitleEl.innerHTML = `${cn} - ${totalVehicles}대 <span class="ml-2 inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full" style="background:${corpColor}22;color:${corpColor}">${corp}</span><span class="ml-1 inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full border" style="border-color:${teamColor};color:${teamColor}">${team}</span>`;
    } else {
        detailTitleEl.textContent = `${customerNames.length}개 거래처 합산 - ${totalVehicles}대`;
    }

    // Customer colors - vary lightness within same corp to distinguish
    const corpShades = {
        '온버스':  ['#3B82F6','#60A5FA','#1D4ED8','#93C5FD','#2563EB','#BFDBFE'],
        '원더온':  ['#10B981','#34D399','#059669','#6EE7B7','#047857'],
        '알이백':  ['#8B5CF6','#A78BFA','#6D28D9','#C4B5FD','#5B21B6']
    };
    const corpCount = {};
    const customerColors = customerNames.map(n => {
        const corp = CUSTOMER_COMPANY[n] || '온버스';
        const idx = corpCount[corp] || 0;
        corpCount[corp] = idx + 1;
        const shades = corpShades[corp] || corpShades['온버스'];
        return shades[idx % shades.length];
    });

    // Build matrix table HTML
    let thead = '<tr class="text-left text-xs border-b-2 border-gray-200"><th class="py-2.5 px-2 font-semibold text-gray-600" style="min-width:80px">충전소</th>';
    customerNames.forEach((n, i) => {
        const corp = CUSTOMER_COMPANY[n] || '온버스';
        const team = CUSTOMER_TEAM[n] || '-';
        const teamColor = TEAM_COLORS[team] || '#6B7280';
        const teamBg = team === '원더온' ? `${teamColor}15` : 'transparent';
        thead += `<th class="py-2 px-2 text-right" style="min-width:70px"><span class="font-semibold text-xs leading-tight block" style="color:${customerColors[i]}">${displayName(n)}</span><span class="text-[10px] font-normal" style="color:${CORP_COLORS[corp]}">${corp}</span> <span class="text-[10px] font-normal px-1 rounded border" style="color:${teamColor};border-color:${teamColor};background:${teamBg}">${team}</span></th>`;
    });
    thead += '<th class="py-2.5 px-2 text-right font-bold text-gray-800 bg-gray-50">합계(kg)</th>';
    thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">횟수</th>';
    thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">금액<span class="normal-case text-[9px] text-gray-400 block">VAT포함</span></th></tr>';

    // Body rows
    const grandTotal = { kg: 0, count: 0, amount: 0 };
    const customerTotals = {};
    customerNames.forEach(n => customerTotals[n] = 0);

    let tbody = '';
    stationEntries.forEach(([sName, data]) => {
        tbody += `<tr class="border-b border-gray-100 hover:bg-blue-50/30 transition-colors">`;
        tbody += `<td class="py-2 px-2 font-medium text-gray-800 text-sm" style="min-width:80px">${displayStation(sName)}</td>`;
        customerNames.forEach((n, i) => {
            const kg = data.customers[n] || 0;
            customerTotals[n] += kg;
            if (kg > 0) {
                tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${Math.round(kg).toLocaleString('ko-KR')}</td>`;
            } else {
                tbody += `<td class="py-2 px-2 text-right text-gray-300">-</td>`;
            }
        });
        tbody += `<td class="py-2 px-2 text-right font-bold text-sm bg-gray-50 tabular-nums">${Math.round(data.total.kg).toLocaleString('ko-KR')}</td>`;
        tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${data.total.count.toLocaleString('ko-KR')}</td>`;
        tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${(data.total.amount / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}만</td>`;
        tbody += '</tr>';
        grandTotal.kg += data.total.kg;
        grandTotal.count += data.total.count;
        grandTotal.amount += data.total.amount;
    });

    // Footer
    let tfoot = '<tr class="border-t-2 border-gray-300 font-bold bg-gray-50">';
    tfoot += '<td class="py-2.5 px-2 text-sm">합계</td>';
    customerNames.forEach((n, i) => {
        tfoot += `<td class="py-2.5 px-2 text-right text-sm" style="color:${customerColors[i]}">${Math.round(customerTotals[n]).toLocaleString('ko-KR')}</td>`;
    });
    tfoot += `<td class="py-2.5 px-2 text-right text-sm bg-gray-100">${Math.round(grandTotal.kg).toLocaleString('ko-KR')}</td>`;
    tfoot += `<td class="py-2.5 px-2 text-right text-sm">${grandTotal.count.toLocaleString('ko-KR')}</td>`;
    tfoot += `<td class="py-2.5 px-2 text-right text-sm">${(grandTotal.amount / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}만</td>`;
    tfoot += '</tr>';

    document.getElementById('detailTableBody').innerHTML = tbody;
    const tableEl = document.getElementById('detailTableBody').closest('table');
    tableEl.querySelector('thead tr').outerHTML = thead;
    let tfootEl = tableEl.querySelector('tfoot');
    if (!tfootEl) { tfootEl = document.createElement('tfoot'); tableEl.appendChild(tfootEl); }
    tfootEl.innerHTML = tfoot;

    // Horizontal Stacked Bar chart
    if (detailPieChart) detailPieChart.destroy();
    const ctx = document.getElementById('detailPieChart').getContext('2d');
    const top8 = stationEntries.slice(0, 8);

    // Dynamic height: fixed bar height per row + padding
    const chartH = Math.max(120, top8.length * 40 + 60);
    document.getElementById('detailPieChart').parentElement.style.height = chartH + 'px';

    detailPieChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: top8.map(([s]) => displayStation(s)),
            datasets: customerNames.map((n, i) => ({
                label: n,
                data: top8.map(([, d]) => Math.round(d.customers[n] || 0)),
                _amounts: top8.map(([sName, d]) => {
                    const detail2 = getNormalizedDetail(currentMonth);
                    const st = detail2[n];
                    return st && st[sName] ? st[sName].amount : 0;
                }),
                backgroundColor: customerColors[i],
                borderColor: '#ffffff',
                borderWidth: 1,
                borderSkipped: false,
                barThickness: 20,
                maxBarThickness: 20,
                borderRadius: 3
            }))
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'rectRounded', boxWidth: 8, font: { size: 10 } } },
                tooltip: {
                    mode: 'index', intersect: true, axis: 'y',
                    backgroundColor: 'rgba(17,24,39,0.9)', cornerRadius: 8, padding: 10,
                    filter: ctx => ctx.parsed.x > 0,
                    callbacks: { label: ctx => {
                        const amt = ctx.dataset._amounts?.[ctx.dataIndex] || 0;
                        const amtStr = (amt / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                        return `${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString('ko-KR')}kg / ${amtStr}만원`;
                    }}
                }
            },
            scales: {
                x: { stacked: true, grid: { color: '#f3f4f6', drawBorder: false }, ticks: { font: { size: 10 } } },
                y: { stacked: true, grid: { display: false, drawBorder: false }, ticks: { font: { size: 11 }, color: '#4b5563' } }
            }
        }
    });

    // Scroll to detail
    document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== STATION LIST =====
function renderStationList() {
    const md = MONTHLY_DATA[currentMonth];
    const detail = getNormalizedDetail(currentMonth);
    const container = document.getElementById('customerList');

    // Build station data with aggregated customer info
    const stationData = [];
    md.charging_stations.forEach(s => {
        let totalKg = 0, totalCount = 0, totalAmount = 0, customerCount = 0;
        const customers = getCustomersForMonth(currentMonth);
        const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);
        filtered.forEach(c => {
            const stations = detail[c.name];
            if (stations && stations[s.name]) {
                totalKg += stations[s.name].kg;
                totalCount += stations[s.name].count;
                totalAmount += stations[s.name].amount;
                customerCount++;
            }
        });
        if (totalKg > 0) {
            stationData.push({ name: s.name, totalKg, totalCount, totalAmount, customerCount });
        }
    });
    stationData.sort((a, b) => b.totalKg - a.totalKg);

    // Selection clear button
    const clearBtn = selectedStations.size > 0
        ? `<div class="flex items-center justify-between px-2 py-1.5 mb-1 bg-emerald-50 rounded-lg">
            <span class="text-xs font-medium text-emerald-700">${selectedStations.size}개 충전소 선택</span>
            <button id="clearStationSelection" class="text-xs text-emerald-500 hover:text-emerald-700 font-medium">초기화</button>
        </div>` : '';

    container.innerHTML = clearBtn + stationData.map(s => {
        const isActive = selectedStations.has(s.name);
        const shortName = displayStation(s.name);
        return `<div class="customer-card rounded-lg p-2.5 mb-1.5 ${isActive ? 'active' : ''}" data-station="${s.name}" style="${isActive ? 'border-left-color:#059669;background:#f0fdf4' : ''}">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="w-3.5 h-3.5 rounded flex-shrink-0 border-2 flex items-center justify-center text-[9px]" style="border-color:#059669;${isActive ? 'background:#059669;color:white' : ''}">${isActive ? '✓' : ''}</span>
                    <span class="text-sm font-semibold text-gray-800">${shortName}</span>
                </div>
                <span class="text-xs text-gray-400 flex-shrink-0">${s.customerCount}거래처</span>
            </div>
            <div class="flex items-center gap-3 mt-1.5 ml-5 text-xs text-gray-500">
                <span class="font-medium text-gray-700">${Math.round(s.totalKg).toLocaleString('ko-KR')} kg</span>
                <span>${s.totalCount}회</span>
            </div>
        </div>`;
    }).join('');

    // Clear button
    const clearEl = document.getElementById('clearStationSelection');
    if (clearEl) {
        clearEl.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedStations.clear();
            document.getElementById('detailSection').style.display = 'none';
            renderStationList();
            updateMap();
            updateResetButton();
        });
    }

    // Toggle selection on click
    container.querySelectorAll('.customer-card[data-station]').forEach(el => {
        el.addEventListener('click', () => {
            const name = el.dataset.station;
            if (selectedStations.has(name)) {
                selectedStations.delete(name);
            } else {
                selectedStations.add(name);
            }
            renderStationList();
            drawStationSpokes();
            if (selectedStations.size > 0) showMultiStationDetail();
            else document.getElementById('detailSection').style.display = 'none';
            updateResetButton();
        });
    });
}

// ===== STATION SPOKES =====
function drawStationSpokes() {
    const md = MONTHLY_DATA[currentMonth];
    const detail = getNormalizedDetail(currentMonth);

    spokeLines.forEach(l => map.removeLayer(l));
    spokeLines = [];
    stationLabels.forEach(l => map.removeLayer(l));
    stationLabels = [];

    if (selectedStations.size === 0) return;

    const stationCoords = {};
    md.charging_stations.forEach(s => { stationCoords[s.name] = { lat: s.lat, lng: s.lng }; });

    const customers = getCustomersForMonth(currentMonth);
    const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);

    const bounds = [];
    let allKgs = [];

    // Collect all kg values for proportional width
    for (const sName of selectedStations) {
        filtered.forEach(c => {
            const stations = detail[c.name];
            if (stations && stations[sName]) allKgs.push(stations[sName].kg);
        });
    }
    const maxKg = Math.max(...allKgs) || 1;

    for (const sName of selectedStations) {
        const sc = stationCoords[sName];
        if (!sc) continue;
        bounds.push([sc.lat, sc.lng]);

        filtered.forEach(c => {
            const stations = detail[c.name];
            if (!stations || !stations[sName]) return;
            const info = CUSTOMER_INFO[c.name];
            if (!info) return;

            const color = CORP_COLORS[c.company] || '#3B82F6';
            const w = Math.max(2, 2 + (stations[sName].kg / maxKg) * 6);
            const line = L.polyline([[info.lat, info.lng], [sc.lat, sc.lng]], {
                color, weight: w, opacity: 0.7, className: 'flow-line'
            }).addTo(map);
            spokeLines.push(line);
            bounds.push([info.lat, info.lng]);

            // Customer kg label
            const label = L.marker([info.lat, info.lng], {
                icon: L.divIcon({
                    html: `<div class="station-pill" style="color:${color}">${Math.round(stations[sName].kg).toLocaleString('ko-KR')}kg</div>`,
                    className: 'custom-marker-bg',
                    iconSize: [80, 24],
                    iconAnchor: [40, -16]
                }),
                interactive: false
            });
            map.addLayer(label);
            stationLabels.push(label);
        });
    }

    if (bounds.length > 1) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
}

// ===== MULTI STATION DETAIL =====
function showMultiStationDetail() {
    const detail = getNormalizedDetail(currentMonth);
    const md = MONTHLY_DATA[currentMonth];
    if (selectedStations.size === 0) return;

    const customers = getCustomersForMonth(currentMonth);
    const filtered = corpFilter === '전체' ? customers : customers.filter(c => c.company === corpFilter);

    // Find all customers that used any selected station
    const customerSet = new Set();
    for (const sName of selectedStations) {
        filtered.forEach(c => {
            const stations = detail[c.name];
            if (stations && stations[sName]) customerSet.add(c.name);
        });
    }
    const customerNames = [...customerSet].sort((a, b) => {
        // Sort by total kg across selected stations
        let aKg = 0, bKg = 0;
        for (const sName of selectedStations) {
            const aS = detail[a]; if (aS && aS[sName]) aKg += aS[sName].kg;
            const bS = detail[b]; if (bS && bS[sName]) bKg += bS[sName].kg;
        }
        return bKg - aKg;
    });

    document.getElementById('detailSection').style.display = '';
    const stationNames = [...selectedStations];
    const titleText = selectedStations.size === 1
        ? `⛽ ${displayStation(stationNames[0])} — ${customerNames.length}개 거래처`
        : `⛽ ${selectedStations.size}개 충전소 합산 — ${customerNames.length}개 거래처`;
    document.getElementById('detailTitle').textContent = titleText;

    if (selectedStations.size === 1) {
        // Single station selected: show customers as rows
        const sName = stationNames[0];
        const users = [];
        filtered.forEach(c => {
            const stations = detail[c.name];
            if (stations && stations[sName]) {
                users.push({ name: c.name, company: c.company, ...stations[sName] });
            }
        });
        users.sort((a, b) => b.kg - a.kg);

        const totalKg = users.reduce((s, u) => s + u.kg, 0);
        const totalCount = users.reduce((s, u) => s + u.count, 0);
        const totalAmount = users.reduce((s, u) => s + u.amount, 0);

        let thead = '<tr class="text-left text-xs uppercase border-b-2 border-gray-200">';
        thead += '<th class="py-2.5 px-2 font-semibold text-gray-600">거래처</th>';
        thead += '<th class="py-2.5 px-2 font-semibold text-gray-600">계약법인</th>';
        thead += '<th class="py-2.5 px-2 font-semibold text-gray-600">담당팀</th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">충전량(kg)</th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">횟수</th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">금액<span class="normal-case text-[9px] text-gray-400 block">VAT포함</span></th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">비율</th></tr>';

        let tbody = '';
        users.forEach(u => {
            const color = CORP_COLORS[u.company] || '#3B82F6';
            const team = CUSTOMER_TEAM[u.name] || '-';
            const teamColor = TEAM_COLORS[team] || '#6B7280';
            const teamBg = team === '원더온' ? `${teamColor}15` : 'transparent';
            const pct = totalKg > 0 ? ((u.kg / totalKg) * 100).toFixed(1) : 0;
            tbody += `<tr class="border-b border-gray-100 hover:bg-blue-50/30 transition-colors">`;
            tbody += `<td class="py-2 px-2 font-medium text-gray-800 text-sm">${u.name}</td>`;
            tbody += `<td class="py-2 px-2 text-sm"><span class="inline-flex items-center gap-1"><span class="w-2 h-2 rounded-full" style="background:${color}"></span>${u.company}</span></td>`;
            tbody += `<td class="py-2 px-2 text-sm"><span class="px-1.5 py-0.5 rounded border text-xs" style="color:${teamColor};border-color:${teamColor};background:${teamBg}">${team}</span></td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm font-medium tabular-nums">${Math.round(u.kg).toLocaleString('ko-KR')}</td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${u.count.toLocaleString('ko-KR')}</td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${(u.amount / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}만</td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${pct}%</td></tr>`;
        });

        let tfoot = '<tr class="border-t-2 border-gray-300 font-bold bg-gray-50">';
        tfoot += `<td class="py-2.5 px-2 text-sm">합계</td><td class="py-2.5 px-2 text-sm" colspan="2">${users.length}개</td>`;
        tfoot += `<td class="py-2.5 px-2 text-right text-sm">${Math.round(totalKg).toLocaleString('ko-KR')}</td>`;
        tfoot += `<td class="py-2.5 px-2 text-right text-sm">${totalCount.toLocaleString('ko-KR')}</td>`;
        tfoot += `<td class="py-2.5 px-2 text-right text-sm">${(totalAmount / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}만</td>`;
        tfoot += `<td class="py-2.5 px-2 text-right text-sm">100%</td></tr>`;

        const tableEl = document.getElementById('detailTableBody').closest('table');
        tableEl.querySelector('thead tr').outerHTML = thead;
        document.getElementById('detailTableBody').innerHTML = tbody;
        let tfootEl = tableEl.querySelector('tfoot');
        if (!tfootEl) { tfootEl = document.createElement('tfoot'); tableEl.appendChild(tfootEl); }
        tfootEl.innerHTML = tfoot;

        // Chart
        if (detailPieChart) detailPieChart.destroy();
        const ctx = document.getElementById('detailPieChart').getContext('2d');
        const chartH = Math.max(120, users.length * 40 + 60);
        document.getElementById('detailPieChart').parentElement.style.height = chartH + 'px';
        detailPieChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: users.map(u => u.name.length > 10 ? u.name.substring(0, 10) + '\u2026' : u.name),
                datasets: [{
                    label: '충전량(kg)',
                    data: users.map(u => Math.round(u.kg)),
                    _amounts: users.map(u => u.amount),
                    backgroundColor: users.map(u => CORP_COLORS[u.company] || '#3B82F6'),
                    borderColor: '#ffffff', borderWidth: 1, barThickness: 24, maxBarThickness: 24, borderRadius: 4
                }]
            },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(17,24,39,0.9)', cornerRadius: 8, padding: 10,
                        callbacks: { label: ctx => {
                            const amt = ctx.dataset._amounts?.[ctx.dataIndex] || 0;
                            const amtStr = (amt / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                            return `${ctx.parsed.x.toLocaleString('ko-KR')}kg / ${amtStr}만원`;
                        }}
                    }
                },
                scales: {
                    x: { grid: { color: '#f3f4f6', drawBorder: false }, ticks: { font: { size: 10 } } },
                    y: { grid: { display: false, drawBorder: false }, ticks: { font: { size: 11 }, color: '#4b5563' } }
                }
            }
        });
    } else {
        // Multiple stations: matrix with stations as columns, customers as rows
        const stationList = [...selectedStations];

        let thead = '<tr class="text-left text-xs border-b-2 border-gray-200">';
        thead += '<th class="py-2.5 px-2 font-semibold text-gray-600" style="min-width:80px">거래처</th>';
        stationList.forEach(sn => {
            thead += `<th class="py-2 px-2 text-right" style="min-width:70px"><span class="font-semibold text-xs text-emerald-700">${displayStation(sn)}</span></th>`;
        });
        thead += '<th class="py-2.5 px-2 text-right font-bold text-gray-800 bg-gray-50">합계(kg)</th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">횟수</th>';
        thead += '<th class="py-2.5 px-2 text-right font-semibold text-gray-600">금액<span class="normal-case text-[9px] text-gray-400 block">VAT포함</span></th></tr>';

        const grandTotal = { kg: 0, count: 0, amount: 0 };
        const stationTotals = {};
        stationList.forEach(sn => stationTotals[sn] = 0);

        let tbody = '';
        customerNames.forEach(cName => {
            let rowKg = 0, rowCount = 0, rowAmount = 0;
            const cStations = detail[cName] || {};
            stationList.forEach(sn => {
                const d = cStations[sn];
                if (d) { rowKg += d.kg; rowCount += d.count; rowAmount += d.amount; }
            });

            const color = CORP_COLORS[CUSTOMER_COMPANY[cName] || '온버스'];
            tbody += `<tr class="border-b border-gray-100 hover:bg-blue-50/30 transition-colors">`;
            tbody += `<td class="py-2 px-2 font-medium text-gray-800 text-sm" style="min-width:80px"><span class="inline-block w-2 h-2 rounded-full mr-1" style="background:${color}"></span>${displayName(cName)}</td>`;
            stationList.forEach(sn => {
                const d = cStations[sn];
                if (d && d.kg > 0) {
                    stationTotals[sn] += d.kg;
                    tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${Math.round(d.kg).toLocaleString('ko-KR')}</td>`;
                } else {
                    tbody += `<td class="py-2 px-2 text-right text-gray-300">-</td>`;
                }
            });
            tbody += `<td class="py-2 px-2 text-right font-bold text-sm bg-gray-50 tabular-nums">${Math.round(rowKg).toLocaleString('ko-KR')}</td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${rowCount.toLocaleString('ko-KR')}</td>`;
            tbody += `<td class="py-2 px-2 text-right text-sm tabular-nums">${(rowAmount / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}만</td>`;
            tbody += '</tr>';
            grandTotal.kg += rowKg; grandTotal.count += rowCount; grandTotal.amount += rowAmount;
        });

        let tfoot = '<tr class="border-t-2 border-gray-300 font-bold bg-gray-50">';
        tfoot += '<td class="py-2.5 px-2 text-sm">합계</td>';

        const stationColors = ['#059669','#10B981','#34D399','#6EE7B7','#047857','#A7F3D0'];
        detailPieChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: top8c.map(cn => displayName(cn).replace(/<br>/g, ' ')),
                datasets: stationList.map((sn, si) => ({
                    label: displayStation(sn),
                    data: top8c.map(cn => {
                        const d = detail[cn]; return d && d[sn] ? Math.round(d[sn].kg) : 0;
                    }),
                    _amounts: top8c.map(cn => {
                        const d = detail[cn]; return d && d[sn] ? d[sn].amount : 0;
                    }),
                    backgroundColor: stationColors[si % stationColors.length],
                    borderColor: '#ffffff', borderWidth: 1, barThickness: 20, maxBarThickness: 20, borderRadius: 3
                }))

            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,

                    legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'rectRounded', boxWidth: 8, font: { size: 10 } } },
                    tooltip: {

                        backgroundColor: 'rgba(17,24,39,0.9)', cornerRadius: 8, padding: 10,
                        filter: ctx => ctx.parsed.x > 0,
                        callbacks: { label: ctx => {

                            const amtStr = (amt / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                            return `${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString('ko-KR')}kg / ${amtStr}만원`;
                        }}
                    }
                },
                scales: {
                    x: { stacked: true, grid: { color: '#f3f4f6', drawBorder: false }, ticks: { font: { size: 10 } } },
                    y: { stacked: true, grid: { display: false, drawBorder: false }, ticks: { font: { size: 11 }, color: '#4b5563' } }
                }
            }
        });
    }

    document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
